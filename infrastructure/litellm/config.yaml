# routing and provider selection live here, never in app code
model_list:
  # anthropic-only alias
  - model_name: chat-anthropic
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # openai-only alias
  - model_name: chat-openai
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # "chat" load-balances across both providers (alias hides routing)
  - model_name: chat
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: chat
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

litellm_settings:
  # retry across the group on provider error
  num_retries: 2

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
