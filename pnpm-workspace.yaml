packages:
  - "apps/*"
  - "packages/*"
  - "tooling/*"

allowBuilds:
  # esbuild postinstall fetches the native platform binary
  esbuild: true
  # @swc/core postinstall fetches the SWC binary the workflow bundler uses
  '@swc/core': true
  # protobufjs postinstall compiles proto descriptors for the Temporal gRPC client
  protobufjs: true

# pnpm 11 supply-chain policy off for now; reintroduce when CI lands
minimumReleaseAge: 0
